name: CI

on:
    pull_request:
        branches:
            - staging

jobs:
    checks:
        name: Lint and Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: uv sync

            - name: Check formatting
              run: uv run black --check src/ tests/

            - name: Run linter
              run: uv run ruff check src/ tests/

    test:
        name: Tests (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: uv sync

            - name: Run tests
              run: uv run pytest

    build:
        name: Build Distribution
        runs-on: ubuntu-latest
        needs: [ checks, test ]
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: uv sync

            - name: Build package
              run: uv build
